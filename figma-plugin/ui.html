<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>INDmoney DS Sync</title>
<style>
  :root {
    --bg-page: #0e1117;
    --bg-surface: #161a22;
    --bg-surface-2: #1f242e;
    --border: #2a3140;
    --text-1: #f7f8fb;
    --text-2: #b6bdcc;
    --text-3: #8c93a4;
    --accent: #4d93fc;
    --danger: #ff6060;
    --good: #38d39f;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg-page: #ffffff;
      --bg-surface: #f7f8fb;
      --bg-surface-2: #eef0f5;
      --border: #d8dbe3;
      --text-1: #0e1117;
      --text-2: #404858;
      --text-3: #6f7686;
    }
  }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg-page);
    color: var(--text-1);
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
  }
  .panel {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 16px;
  }
  h1 {
    font-size: 14px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.2px;
  }
  .row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  button {
    flex: 1;
    min-width: 100px;
    padding: 9px 12px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-1);
    font: inherit;
    cursor: pointer;
    transition: background 120ms ease, border-color 120ms ease;
  }
  button:hover { background: var(--bg-surface-2); border-color: var(--accent); }
  button.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  button.primary:hover { background: #2f7df0; }
  input {
    width: 100%;
    padding: 8px 10px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-1);
    font: inherit;
    box-sizing: border-box;
  }
  .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-3);
    font-weight: 600;
    margin-bottom: 4px;
  }
  pre.log {
    margin: 0;
    padding: 10px 12px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: ui-monospace, "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--text-2);
    height: 180px;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .err  { color: var(--danger); }
  .good { color: var(--good); }
  .meta { color: var(--text-3); font-family: ui-monospace, "JetBrains Mono", monospace; font-size: 10px; }
</style>
</head>
<body>
<div class="panel">
  <h1>INDmoney DS Sync</h1>

  <div>
    <div class="label">Docs base URL</div>
    <input id="baseURL" value="https://indmoney-design-system-docs.vercel.app" />
  </div>

  <div class="row">
    <button id="ping">Ping</button>
    <button id="select">Selection</button>
  </div>

  <div class="row">
    <button class="primary" id="injectIcons">Inject icons</button>
    <button class="primary" id="injectComponents">Inject components</button>
  </div>

  <div>
    <div class="label">Log</div>
    <pre id="log" class="log">Ready.</pre>
  </div>

  <p class="meta">
    Plugin reads <code>/icons/glyph/manifest.json</code> from the docs site and injects each
    SVG into a frame on the current page. Future: round-trip selection analysis through ds-service.
  </p>
</div>

<script>
const $log = document.getElementById('log');
const post = (type, payload) => parent.postMessage({ pluginMessage: { type, payload } }, '*');
const log = (msg, cls) => {
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = `[${new Date().toLocaleTimeString()}] ${msg}\n`;
  $log.appendChild(span);
  $log.scrollTop = $log.scrollHeight;
};

document.getElementById('baseURL').addEventListener('change', (e) => {
  post('set-base-url', e.target.value);
});
document.getElementById('ping').addEventListener('click', () => post('ping-docs'));
document.getElementById('select').addEventListener('click', () => post('request-selection'));
document.getElementById('injectIcons').addEventListener('click', () => post('inject-icons'));
document.getElementById('injectComponents').addEventListener('click', () => post('inject-components'));

window.onmessage = (event) => {
  const msg = event.data.pluginMessage;
  if (!msg) return;
  switch (msg.type) {
    case 'info':
      log(String(msg.payload));
      break;
    case 'error':
      log(String(msg.payload), 'err');
      break;
    case 'selection':
      log(`Selection (${msg.payload.length}):\n${JSON.stringify(msg.payload, null, 2)}`);
      break;
    case 'injection-progress':
      log(`Injecting… ${msg.payload.done}/${msg.payload.total}`);
      break;
    case 'injection-done':
      log(`Done — ${msg.payload.done}/${msg.payload.total} injected.`, 'good');
      break;
  }
};
// Initial sync of the base URL value to the plugin
post('set-base-url', document.getElementById('baseURL').value);
</script>
</body>
</html>
