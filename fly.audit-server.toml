# fly.toml app configuration file generated for indmoney-audit-server on 2026-05-03T20:25:51+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'indmoney-audit-server'
primary_region = 'bom'

[build]
  dockerfile = 'Dockerfile.audit-server'

[env]
  AUDIT_SERVER_PORT = '7474'
  REPO_DIR = '/repo'
  REQUIRE_AUTH = '1'

[http_service]
  internal_port = 7474
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/__health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
